name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          # Aponte para a URL publica do backend no Render depois do primeiro deploy
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Precisa bater com o nome do repositorio, ex: /crm-whatsapp/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
